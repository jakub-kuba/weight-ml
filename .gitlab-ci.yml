stages:
  - test
  - build
  - deploy

variables:
  IMAGE_API: $CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHORT_SHA
  IMAGE_DASHBOARD: $CI_REGISTRY_IMAGE/dashboard:$CI_COMMIT_SHORT_SHA

# ---------------------------------------------------------------------------
# Stage 1: test — runs on every push
# ---------------------------------------------------------------------------
test:
  tags:
    - saas-linux-small-amd64
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install uv --quiet
    - uv sync --frozen
  script:
    - uv run ruff check src/ tests/
    - uv run pytest tests/ -v --tb=short
  cache:
    key: "$CI_COMMIT_REF_SLUG-uv"
    paths:
      - .venv/

# ---------------------------------------------------------------------------
# Stage 2: build — only on main branch and merge requests
# ---------------------------------------------------------------------------
build-api:
  tags:
    - saas-linux-small-amd64
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f docker/Dockerfile.api -t $IMAGE_API .
    - docker push $IMAGE_API
    - if [ "$CI_COMMIT_BRANCH" = "main" ]; then docker tag $IMAGE_API $CI_REGISTRY_IMAGE/api:latest && docker push $CI_REGISTRY_IMAGE/api:latest; fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build-dashboard:
  tags:
    - saas-linux-small-amd64
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f docker/Dockerfile.dashboard -t $IMAGE_DASHBOARD .
    - docker push $IMAGE_DASHBOARD
    - if [ "$CI_COMMIT_BRANCH" = "main" ]; then docker tag $IMAGE_DASHBOARD $CI_REGISTRY_IMAGE/dashboard:latest && docker push $CI_REGISTRY_IMAGE/dashboard:latest; fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------------------------
# Stage 3: deploy — manual trigger on main branch
# ---------------------------------------------------------------------------
deploy:
  tags:
    - saas-linux-small-amd64
  stage: deploy
  image: alpine:latest
  script:
    - echo "Image $IMAGE_API pushed to registry"
    - echo "Run kubectl set image deployment/api api=$IMAGE_API to deploy"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual