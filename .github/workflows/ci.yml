name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: test — runs on every push and pull request
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run linter
        run: uv run ruff check src/ tests/

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2: build — only on main branch, after tests pass
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/api:latest

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dashboard:${{ github.sha }}
            ghcr.io/${{ github.repository }}/dashboard:latest

  # ---------------------------------------------------------------------------
  # Job 3: deploy — manual trigger only
  # ---------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy
        run: |
          echo "Image ghcr.io/${{ github.repository }}/api:${{ github.sha }} is ready"
          echo "Next step: kubectl set image deployment/api api=ghcr.io/${{ github.repository }}/api:${{ github.sha }}"